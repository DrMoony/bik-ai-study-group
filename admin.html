<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — AI Study Group</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #08312A; color: #E8F5EF;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .box {
      background: #0E443A; border: 1px solid #1F5B4E; border-radius: 16px;
      padding: 40px; width: 340px; text-align: center;
    }
    .box h2 { font-size: 20px; margin-bottom: 8px; }
    .box p  { color: #6E9488; font-size: 13px; margin-bottom: 28px; }
    input {
      width: 100%; padding: 12px 16px; background: #08312A;
      border: 1px solid #1F5B4E; border-radius: 8px; color: #E8F5EF;
      font-size: 15px; outline: none; margin-bottom: 12px;
      text-align: center; letter-spacing: 3px; transition: border-color 0.2s;
    }
    input:focus { border-color: #00E47C; }
    input.error { border-color: #FF5577; }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #00B362, #00E47C);
      color: #08312A; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .err { color: #FF5577; font-size: 13px; margin-top: 10px; display: none; }
    .err.show { display: block; }
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:32px;margin-bottom:16px">🔐</div>
    <h2>Admin</h2>
    <p>제출 기록은 Google Sheets에서 확인합니다</p>
    <input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()" />
    <button class="btn" onclick="login()">열기</button>
    <div class="err" id="err">비밀번호가 올바르지 않습니다.</div>
  </div>
<script>
const HASH = '4f15cc813b8ad664288ab22e9f1ee96a6f744a2e7fc8c3a0a3aeff395b4cee3e';
const SHEETS = 'https://docs.google.com/spreadsheets/d/1zvDfCA9sjqZKpWLReT7F8LBPK1neusessEVETLaANKU/edit';

async function login() {
  const pw = document.getElementById('pw').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hash === HASH) {
    window.location.href = SHEETS;
  } else {
    document.getElementById('pw').classList.add('error');
    document.getElementById('err').classList.add('show');
  }
}
</script>
</body>
</html>
