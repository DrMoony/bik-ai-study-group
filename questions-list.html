<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문제 리스트 — AI Study Group</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #08312A; color: #E8F5EF; padding: 32px; }
    .wrap { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .sub { color: #6E9488; font-size: 13px; margin-bottom: 24px; }
    .toggle { padding: 10px 20px; background: #13584B; border: 1px solid #2B7D6C; border-radius: 8px; color: #4DF09C; font-size: 14px; cursor: pointer; margin-bottom: 24px; }
    .toggle:hover { background: #1A6D5B; }
    .q-card { background: #0E443A; border: 1px solid #1F5B4E; border-radius: 12px; padding: 20px; margin-bottom: 14px; }
    .q-num { font-size: 11px; color: #4DF09C; letter-spacing: 1px; margin-bottom: 8px; }
    .q-text { font-size: 15px; font-weight: 600; margin-bottom: 12px; line-height: 1.5; }
    .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .opt { font-size: 13px; padding: 6px 10px; border-radius: 6px; background: #122E29; color: #9FC0B2; }
    .opt.correct { background: #0D4F35; color: #4DF09C; font-weight: 600; }
    .explanation { font-size: 12px; color: #6E9488; line-height: 1.5; display: none; }
    .explanation.show { display: block; }
    .answers-hidden .opt.correct { background: #122E29; color: #9FC0B2; font-weight: normal; }
    .answers-hidden .explanation { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>전체 문제 리스트 (30문항)</h1>
    <p class="sub">랜덤 10문제 출제 · 문제당 7초</p>
    <button class="toggle" id="toggleBtn" onclick="toggleAnswers()">정답 보기</button>
    <div id="list" class="answers-hidden"></div>
  </div>
  <script>
    let showAnswers = false;
    async function load() {
      const qs = await (await fetch('questions.json')).json();
      document.getElementById('list').innerHTML = qs.map((q, i) =>
        `<div class="q-card">
          <div class="q-num">Q${i+1}</div>
          <div class="q-text">${q.question}</div>
          <div class="opts">${q.options.map((o, j) => `<div class="opt ${j === q.answer ? 'correct' : ''}">${j+1}. ${o}</div>`).join('')}</div>
          <div class="explanation show">${q.explanation}</div>
        </div>`
      ).join('');
    }
    load();
    function toggleAnswers() {
      showAnswers = !showAnswers;
      document.getElementById('list').classList.toggle('answers-hidden', !showAnswers);
      document.getElementById('toggleBtn').textContent = showAnswers ? '정답 숨기기' : '정답 보기';
    }
  </script>
</body>
</html>
