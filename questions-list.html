<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문제 리스트 — AI Study Group</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #08312A; color: #E8F5EF; padding: 32px; }
    .wrap { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .sub { color: #6E9488; font-size: 13px; margin-bottom: 16px; }
    .summary { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .summary .pill { font-size: 12px; padding: 4px 12px; border-radius: 16px; font-weight: 600; letter-spacing: 0.3px; }
    .summary .pill.easy { background: #0D4F35; color: #4DF09C; border: 1px solid #00E47C44; }
    .summary .pill.medium { background: #3D3520; color: #FFC845; border: 1px solid #FFC84544; }
    .summary .pill.hard { background: #3D1420; color: #FF8899; border: 1px solid #FF557744; }
    .summary .pill.total { background: #0E443A; color: #9FC0B2; border: 1px solid #1F5B4E; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .toggle { padding: 10px 20px; background: #13584B; border: 1px solid #2B7D6C; border-radius: 8px; color: #4DF09C; font-size: 14px; cursor: pointer; }
    .toggle:hover { background: #1A6D5B; }
    .filter-btn { padding: 8px 14px; background: #0E443A; border: 1px solid #1F5B4E; border-radius: 8px; color: #9FC0B2; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: #2B7D6C; }
    .filter-btn.active { background: #13584B; border-color: #00E47C; color: #4DF09C; font-weight: 600; }
    .q-card { background: #0E443A; border: 1px solid #1F5B4E; border-radius: 12px; padding: 20px; margin-bottom: 14px; }
    .q-card.hidden { display: none; }
    .q-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .q-num { font-size: 11px; color: #4DF09C; letter-spacing: 1px; }
    .badge-diff { display: inline-block; font-size: 10px; padding: 2px 10px; border-radius: 10px; font-weight: 600; letter-spacing: 0.3px; }
    .badge-diff.easy { background: #0D4F35; color: #4DF09C; border: 1px solid #00E47C44; }
    .badge-diff.medium { background: #3D3520; color: #FFC845; border: 1px solid #FFC84544; }
    .badge-diff.hard { background: #3D1420; color: #FF8899; border: 1px solid #FF557744; }
    .q-text { font-size: 15px; font-weight: 600; margin-bottom: 12px; line-height: 1.5; }
    .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .opt { font-size: 13px; padding: 6px 10px; border-radius: 6px; background: #122E29; color: #9FC0B2; }
    .opt.correct { background: #0D4F35; color: #4DF09C; font-weight: 600; }
    .explanation { font-size: 12px; color: #6E9488; line-height: 1.5; display: none; }
    .explanation.show { display: block; }
    .answers-hidden .opt.correct { background: #122E29; color: #9FC0B2; font-weight: normal; }
    .answers-hidden .explanation { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>전체 문제 리스트 (30문항)</h1>
    <p class="sub">실제 출제: 쉬움 5 · 중간 3 · 어려움 2 = 10문제 · 문제당 7초</p>
    <div class="summary" id="summary"></div>
    <div class="controls">
      <button class="toggle" id="toggleBtn" onclick="toggleAnswers()">정답 보기</button>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">전체</button>
      <button class="filter-btn" data-filter="easy" onclick="setFilter('easy')">쉬움</button>
      <button class="filter-btn" data-filter="medium" onclick="setFilter('medium')">중간</button>
      <button class="filter-btn" data-filter="hard" onclick="setFilter('hard')">어려움</button>
    </div>
    <div id="list" class="answers-hidden"></div>
  </div>
  <script>
    const DIFF_LABEL = { easy: '쉬움', medium: '중간', hard: '어려움' };
    let showAnswers = false;
    let currentFilter = 'all';
    let loadedQs = [];

    async function load() {
      loadedQs = await (await fetch('questions.json')).json();
      const counts = loadedQs.reduce((a, q) => { a[q.difficulty] = (a[q.difficulty] || 0) + 1; return a; }, {});
      document.getElementById('summary').innerHTML = `
        <span class="pill total">전체 ${loadedQs.length}</span>
        <span class="pill easy">쉬움 ${counts.easy || 0}</span>
        <span class="pill medium">중간 ${counts.medium || 0}</span>
        <span class="pill hard">어려움 ${counts.hard || 0}</span>
      `;
      renderList();
    }

    function renderList() {
      document.getElementById('list').innerHTML = loadedQs.map((q, i) => {
        const diff = q.difficulty || 'easy';
        const hidden = (currentFilter !== 'all' && currentFilter !== diff) ? ' hidden' : '';
        return `<div class="q-card${hidden}">
          <div class="q-header">
            <span class="q-num">Q${i+1}</span>
            <span class="badge-diff ${diff}">${DIFF_LABEL[diff] || diff}</span>
          </div>
          <div class="q-text">${q.question}</div>
          <div class="opts">${q.options.map((o, j) => `<div class="opt ${j === q.answer ? 'correct' : ''}">${j+1}. ${o}</div>`).join('')}</div>
          <div class="explanation show">${q.explanation}</div>
        </div>`;
      }).join('');
    }

    function toggleAnswers() {
      showAnswers = !showAnswers;
      document.getElementById('list').classList.toggle('answers-hidden', !showAnswers);
      document.getElementById('toggleBtn').textContent = showAnswers ? '정답 숨기기' : '정답 보기';
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      renderList();
    }

    load();
  </script>
</body>
</html>
